{% extends "base.html" %}

{% block title %}Edit Profile - Let's Go{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-4">Edit Profile</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="bio" class="form-label">Bio</label>
                        <textarea class="form-control" id="bio" name="bio" rows="3">{{ user.bio or '' }}</textarea>
                        <small class="text-muted">Tell people about yourself</small>
                    </div>
                    <div class="mb-3">
                        <label for="avatar_url" class="form-label">Avatar URL</label>
                        <input type="url" class="form-control" id="avatar_url" name="avatar_url" value="{{ user.avatar_url or '' }}" placeholder="https://example.com/avatar.jpg">
                        <small class="text-muted">Enter a URL to your profile picture</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Changes
                        </button>
                        <a href="{{ url_for('users.profile', username=user.username) }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
